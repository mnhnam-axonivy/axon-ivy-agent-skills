# =============================================================================
# REFERENCE: CMS YAML structure showing all common patterns
# This file demonstrates key hierarchy, namespaces, and value formats.
# =============================================================================

# --- Portal CMS Overrides ---
# Override built-in Axon Ivy Portal labels using their exact namespace.
# Only override keys that exist in Portal's default CMS.
ch.ivy.addon.portal.generic:
  CaseDetailsTemplate:
    noCaseFound: Case not found or you don't have permission to view this case.
  OpenTaskTemplate:
    browserTabClosingWarning: You may lose your work in progress. Do you want to continue?

ch.ivy.addon.portalkit.ui.jsf:
  common:
    save: Save
    cancel: Cancel
    delete: Delete
  dashboard:
    command:
      addDashboard: Add dashboard
  taskList:
    columns: Manage Columns
  Enums:
    ProcessType:
      EXTERNAL_LINK: External Link
      IVY_PROCESS: Business Process

# --- Dialog Labels ---
# Key path mirrors the dialog's Java package path.
# Access: ivy.cms.co('/Dialogs/hr/onboarding/StartOnboarding/Title')
Dialogs:
  hr:
    onboarding:
      StartOnboarding:
        Title: Start Employee Onboarding
        SubmitButton: Submit
        CancelButton: Cancel
      ReviewOnboarding:
        Title: Review Onboarding Request
        ApproveButton: Approve
        RejectButton: Reject

# --- Process Labels ---
# Used for process start names and descriptions.
# Access: ivy.cms.co('/Processes/hr/onboarding/StartOnboarding/name')
Processes:
  hr:
    onboarding:
      StartOnboarding:
        name: Employee Onboarding
        description: Start the employee onboarding process

# --- Shared Labels ---
# Reusable across multiple dialogs and processes.
# Access: ivy.cms.co('/Labels/Submit')
Labels:
  Cancel: Cancel
  Submit: Submit
  Approve: Approve
  Reject: Reject
  Select: 'Select...'
  Yes: 'Yes'
  No: 'No'

# --- Email Templates ---
# Used in email-sending process elements.
# Access: ivy.cms.co('/Email/OnboardingNotification/subject')
Email:
  OnboardingNotification:
    subject: 'New Onboarding: {0}'
    greeting: 'Hello {0},'
    body: A new onboarding request has been submitted for your review.
    actionLink: Review Now

